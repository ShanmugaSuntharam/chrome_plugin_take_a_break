<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take a Break Reminder</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Take a Break</h1>
            <p class="subtitle">Stay healthy, stay productive</p>
        </header>

        <div class="status-section">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Active</span>
            </div>
            <div class="next-break">
                <span id="countdownLabel">Next break in:</span>
                <span id="countdown" class="countdown">--:--</span>
            </div>
        </div>

        <div class="settings-section">
            <div class="setting-group">
                <label for="breakInterval">Break Interval (minutes):</label>
                <select id="breakInterval">
                    <option value="5">5 minutes</option>
                    <option value="10">10 minutes</option>
                    <option value="15">15 minutes</option>
                    <option value="20">20 minutes</option>
                    <option value="25" selected>25 minutes</option>
                    <option value="30">30 minutes</option>
                    <option value="35">35 minutes</option>
                    <option value="40">40 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="50">50 minutes</option>
                    <option value="55">55 minutes</option>
                    <option value="60">60 minutes</option>
                    <option value="65">65 minutes</option>
                    <option value="70">70 minutes</option>
                    <option value="75">75 minutes</option>
                    <option value="80">80 minutes</option>
                    <option value="85">85 minutes</option>
                    <option value="90">90 minutes</option>
                    <option value="95">95 minutes</option>
                    <option value="100">100 minutes</option>
                    <option value="105">105 minutes</option>
                    <option value="110">110 minutes</option>
                    <option value="115">115 minutes</option>
                    <option value="120">120 minutes</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="breakDuration">Break Duration (minutes):</label>
                <select id="breakDuration">
                    <option value="1">1 minute</option>
                    <option value="2">2 minutes</option>
                    <option value="3">3 minutes</option>
                    <option value="4">4 minutes</option>
                    <option value="5" selected>5 minutes</option>
                    <option value="6">6 minutes</option>
                    <option value="7">7 minutes</option>
                    <option value="8">8 minutes</option>
                    <option value="9">9 minutes</option>
                    <option value="10">10 minutes</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="enableNotifications">
                    <span class="checkmark"></span>
                    <span id="notificationsLabel">Enable desktop notifications</span>
                </label>
            </div>

            <div class="setting-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="enableSound">
                    <span class="checkmark"></span>
                    <span id="soundLabel">Play sound on break</span>
                </label>
            </div>
        </div>

        <div class="actions-section">
            <button id="startBtn" class="btn btn-primary">Start Timer</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
            <button id="skipBtn" class="btn btn-secondary" disabled>Skip to Break</button>
        </div>
        
        <div class="test-section">
            <button id="testNotificationsBtn" class="btn btn-text">Test Notifications</button>
            <button id="testSoundBtn" class="btn btn-text">Test Sound</button>
        </div>

        <div class="break-tips">
            <h3>Break Ideas</h3>
            <div class="tips-grid">
                <div class="tip">
                    <span class="tip-icon">👀</span>
                    <span>20-20-20 Rule: Look 20ft away for 20 seconds</span>
                </div>
                <div class="tip">
                    <span class="tip-icon">💧</span>
                    <span>Stay hydrated - drink some water</span>
                </div>
                <div class="tip">
                    <span class="tip-icon">🧘</span>
                    <span>Do some light stretching</span>
                </div>
                <div class="tip">
                    <span class="tip-icon">🚶</span>
                    <span>Take a short walk</span>
                </div>
            </div>
        </div>

        <footer class="footer">
            <button id="resetBtn" class="btn btn-text">Reset Settings</button>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
